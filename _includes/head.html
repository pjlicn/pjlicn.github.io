{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<script>
  (function () {
    const storageKey = 'theme-preference';
    const root = document.documentElement;
    let storedTheme = null;

    try {
      storedTheme = localStorage.getItem(storageKey);
    } catch (e) {
      // localStorage may be unavailable (private mode / blocked)
    }

    const hasUserPreference = storedTheme === 'light' || storedTheme === 'dark';
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = hasUserPreference ? storedTheme : (prefersDark ? 'dark' : 'light');

    root.setAttribute('data-theme', theme);
    root.style.colorScheme = theme;

    if (hasUserPreference) {
      root.setAttribute('data-theme-source', 'user');
    } else {
      root.removeAttribute('data-theme-source');
    }
  })();
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">

<meta http-equiv="cleartype" content="on">
