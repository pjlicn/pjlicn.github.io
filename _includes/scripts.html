<script src="{{ base_path }}/assets/js/main.min.js"></script>
<script>
  (function () {
    var themeStorageKey = 'theme';

    function storedTheme() {
      try {
        var value = window.localStorage.getItem(themeStorageKey);
        return value === 'dark' || value === 'light' ? value : null;
      } catch (error) {
        return null;
      }
    }

    function setStoredTheme(theme) {
      try {
        window.localStorage.setItem(themeStorageKey, theme);
      } catch (error) {
        // Continue without persistence when storage is unavailable.
      }
    }

    function systemTheme() {
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme(theme) {
      var dark = theme === 'dark';
      var root = document.documentElement;
      var toggle = document.querySelector('#theme-toggle a');
      var icon = document.getElementById('theme-icon');

      if (dark) {
        root.setAttribute('data-theme', 'dark');
      } else {
        root.removeAttribute('data-theme');
      }

      if (toggle) {
        toggle.setAttribute('aria-pressed', String(dark));
      }
      if (icon) {
        icon.classList.toggle('fa-sun', !dark);
        icon.classList.toggle('fa-moon', dark);
      }
    }

    function setupThemeToggle() {
      var toggle = document.getElementById('theme-toggle');
      if (!toggle) return;

      applyTheme(storedTheme() || systemTheme());
      toggle.addEventListener('click', function (event) {
        event.preventDefault();
        event.stopImmediatePropagation();
        var nextTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        setStoredTheme(nextTheme);
        applyTheme(nextTheme);
      }, true);

      if (window.matchMedia) {
        var mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        var updateForSystemTheme = function (event) {
          if (!storedTheme()) applyTheme(event.matches ? 'dark' : 'light');
        };
        if (mediaQuery.addEventListener) {
          mediaQuery.addEventListener('change', updateForSystemTheme);
        } else if (mediaQuery.addListener) {
          mediaQuery.addListener(updateForSystemTheme);
        }
      }
    }

    function setupFollowMenu() {
      var wrapper = document.querySelector('.author__urls-wrapper');
      var button = wrapper && wrapper.querySelector('button');
      if (!wrapper || !button) return;

      button.type = 'button';
      button.setAttribute('aria-expanded', 'false');
      button.addEventListener('click', function (event) {
        event.preventDefault();
        event.stopImmediatePropagation();
        var open = wrapper.classList.toggle('is-open');
        button.setAttribute('aria-expanded', String(open));
      }, true);
    }

    /*
     * Keep the reference site's greedy-navigation behavior, but run it without
     * depending on the legacy plugin. Links move one-by-one into the menu only
     * when the current viewport cannot fit them.
     */
    function setupAdaptiveNavigation() {
      var nav = document.getElementById('site-nav');
      if (!nav) return;

      var button = nav.querySelector('button');
      var visible = nav.querySelector('.visible-links');
      var hidden = nav.querySelector('.hidden-links');
      var tail = visible && visible.querySelector('.persist.tail');
      if (!button || !visible || !hidden || !tail) return;

      var links = Array.prototype.filter.call(visible.children, function (item) {
        return !item.classList.contains('persist');
      });
      var resizeFrame;

      function closeMenu() {
        hidden.classList.add('hidden');
        button.classList.remove('close');
        button.setAttribute('aria-expanded', 'false');
      }

      function layoutNavigation() {
        /* Restore the full navigation first, then move only as many items as
           this exact viewport requires. */
        links.forEach(function (item) {
          visible.insertBefore(item, tail);
        });
        closeMenu();
        button.classList.add('hidden');

        if (visible.scrollWidth <= nav.clientWidth) return;

        button.classList.remove('hidden');
        var availableWidth = nav.clientWidth - button.offsetWidth - 12;
        var remaining = links.slice();

        while (visible.scrollWidth > availableWidth && remaining.length) {
          var item = remaining.pop();
          hidden.insertBefore(item, hidden.firstChild);
        }

        if (!hidden.children.length) {
          button.classList.add('hidden');
        }
      }

      button.addEventListener('click', function (event) {
        if (!hidden.children.length) return;
        event.preventDefault();
        event.stopImmediatePropagation();
        hidden.classList.toggle('hidden');
        button.classList.toggle('close', !hidden.classList.contains('hidden'));
        button.setAttribute('aria-expanded', String(!hidden.classList.contains('hidden')));
      }, true);

      window.addEventListener('resize', function () {
        window.cancelAnimationFrame(resizeFrame);
        resizeFrame = window.requestAnimationFrame(layoutNavigation);
      });
      window.addEventListener('orientationchange', layoutNavigation);
      layoutNavigation();
    }

    function initialize() {
      setupThemeToggle();
      setupFollowMenu();
      setupAdaptiveNavigation();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initialize);
    } else {
      initialize();
    }
  }());
</script>
